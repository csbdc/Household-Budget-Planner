services:
  budget:
    build:
      context: .
      target: runner
    init: true
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    volumes:
      - budget_data:/app/.wrangler
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  budget_data:
